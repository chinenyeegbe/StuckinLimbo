<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuespaces Signal Radar</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">📡</span>
      <div>
        <h1>Signal Radar</h1>
        <p class="tagline">Catch buyers in the pre-conviction window — before they commit to bad ground.</p>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="digest">Daily Digest</button>
      <button class="tab" data-view="inbox">Inbox</button>
      <button class="tab" data-view="board">Kanban</button>
      <button class="tab" data-view="alerts">Slack Alerts</button>
    </nav>
  </header>

  <main id="app"></main>

  <!-- Lead detail drawer -->
  <div id="drawer" class="drawer hidden">
    <div class="drawer-backdrop" data-close></div>
    <aside class="drawer-panel" id="drawer-panel"></aside>
  </div>

  <footer class="footnote">
    <span>Public signals only · Commercial &amp; infrastructure only · Drafts not sends · No hallucinated leads</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
